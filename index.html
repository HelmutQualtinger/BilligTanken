<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BilligTanken Österreich</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #f0f4f8; }
  #map {
    height: 100vh;
    background: #dde8f0;
  }
  .leaflet-control-zoom,
  .leaflet-control-attribution { display: none !important; }

  /* State label: Wappen + Name */
  .bl-label {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    text-align: center; pointer-events: none;
  }
  .bl-label img { width: 64px; height: 64px; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,.4)); }
  .bl-label span {
    font-size: .68rem; font-weight: 700; color: #1a1a2e;
    text-shadow: 0 1px 3px #fff, 0 0 6px #fff;
    white-space: nowrap;
  }

  /* Fuel link label */
  .bl-label.fuel { pointer-events: auto; cursor: pointer; }
  .bl-label.fuel .nozzle {
    font-size: 3.5rem; line-height: 1;
    display: block; text-decoration: none;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,.5));
    transition: transform .15s;
  }
  .bl-label.fuel .nozzle:hover { transform: scale(1.15); }
  .bl-label.fuel .fuel-btn {
    margin-top: 3px;
    background: #e63; color: #fff;
    border-radius: 5px; padding: 3px 8px;
    font-size: .68rem; font-weight: 700;
    box-shadow: 0 2px 5px rgba(0,0,0,.3);
    white-space: nowrap; text-decoration: none;
    display: inline-block;
  }
  .bl-label.fuel .fuel-btn:hover { background: #c52; }
  .bl-label.fuel .webcam-btn { background: #0077cc; }
  .bl-label.fuel .webcam-btn:hover { background: #005fa3; }
</style>
</head>
<body>
<div id="map"></div>
<script>
const map = L.map('map', {
  zoomControl: false, dragging: false,
  scrollWheelZoom: false, doubleClickZoom: false,
  boxZoom: false, keyboard: false, touchZoom: false
});

// Colors and data per Bundesland
const BL = {
  'Wien':             { color: '#f7b3b3', wappen: 'Wien_3_Wappen.svg',               fuel: 'alterlaa-tanken.html',   lat: 48.210, lon: 16.370 },
  'Niederösterreich': { color: '#f7d9b3', wappen: 'Nieder%C3%B6sterreich_CoA.svg',   lat: 48.220, lon: 15.750 },
  'Oberösterreich':   { color: '#f7f4b3', wappen: 'Oberoesterreich_Wappen.svg',       fuel: 'schaerding-tanken.html', lat: 48.100, lon: 14.000 },
  'Salzburg':         { color: '#b3e8b3', wappen: 'Salzburg_Wappen.svg',              lat: 47.520, lon: 13.200 },
  'Tirol':            { color: '#b3cff7', wappen: 'AUT_Tirol_COA.svg',                fuel: 'innsbruck-tanken.html', lat: 47.100, lon: 11.400 },
  'Vorarlberg':       { color: '#d4b3f7', wappen: 'Vorarlberg_CoA.svg',               fuel: 'index-vorarlberg.html', webcam: 'webcam-vorarlberg.html', lat: 47.300, lon: 9.920 },
  'Kärnten':          { color: '#b3f4e0', wappen: 'Kaernten_CoA.svg',                 lat: 46.780, lon: 14.200 },
  'Steiermark':       { color: '#d0f4b3', wappen: 'Wappen_Steiermark.svg',            lat: 47.200, lon: 15.300 },
  'Burgenland':       { color: '#f7dcb3', wappen: 'Burgenland_Wappen.svg',            lat: 47.500, lon: 16.530 },
};

const BASE = 'https://commons.wikimedia.org/wiki/Special:FilePath/';
const WAPPEN_SZ = '?width=80';

fetch('https://cdn.jsdelivr.net/gh/ginseng666/GeoJSON-TopoJSON-Austria@master/2021/simplified-99.9/laender_999_geo.json')
  .then(r => r.json())
  .then(data => {
    L.geoJSON(data, {
      style: f => {
        const name = f.properties.name;
        const bl = BL[name] || {};
        return { color: '#6a8fa8', weight: 1.5, fillColor: bl.color || '#ccc', fillOpacity: .9 };
      }
    }).addTo(map);

    // Fit Austria
    const bounds = L.geoJSON(data).getBounds();
    map.fitBounds(bounds, { padding: [10, 10] });

    // Add labels
    Object.entries(BL).forEach(([name, bl]) => {
      const wappenUrl = BASE + bl.wappen + WAPPEN_SZ;
      let inner;
      if (bl.fuel) {
        inner = `
          <a class="nozzle" href="${bl.fuel}">⛽</a>
          <img src="${wappenUrl}" alt="${name}" onerror="this.style.display='none'">
          <span>${name}</span>
          <a class="fuel-btn" href="${bl.fuel}">Preise</a>
          ${bl.webcam ? `<a class="fuel-btn webcam-btn" href="${bl.webcam}">📷 Webcams</a>` : ''}`;
      } else {
        inner = `
          <img src="${wappenUrl}" alt="${name}" onerror="this.style.display='none'">
          <span>${name}</span>`;
      }
      const icon = L.divIcon({
        className: '',
        html: `<div class="bl-label${bl.fuel ? ' fuel' : ''}">${inner}</div>`,
        iconAnchor: [0, 0]
      });
      L.marker([bl.lat, bl.lon], { icon, interactive: false }).addTo(map);
    });
  });
</script>
</body>
</html>
